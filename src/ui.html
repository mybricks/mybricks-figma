<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      background: #fff;
      padding: 20px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 320px;
    }
    .title {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    .drop-zone {
      flex: 1;
      min-height: 180px;
      background: #f5f9fc;
      border: 2px dashed #18a0fb;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
    }
    .drop-zone:focus-within { background: #eef6fc; border-color: #0d8de5; }
    .drop-zone .prompt {
      font-size: 13px;
      color: #666;
      text-align: center;
      pointer-events: none;
      display: none;
    }
    .drop-zone .icon {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
      color: #18a0fb;
      display: none;
    }
    .drop-zone.placeholder-only .icon { display: block; }
    .drop-zone.placeholder-only .prompt { display: block; }
    .drop-zone .prompt strong { color: #18a0fb; font-weight: 600; }
    .drop-zone #json {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100%;
      height: 100%;
      padding: 16px;
      border: none;
      background: transparent;
      resize: none;
      outline: none;
      font-family: 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      color: #1a1a1a;
    }
    .drop-zone #json::placeholder { color: #999; }
    .drop-zone.placeholder-only #json { opacity: 0; }
    .drop-zone.placeholder-only #json::placeholder { opacity: 1; }
    .footer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    .btn-generate {
      height: 36px;
      padding: 0 20px;
      background: #18a0fb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-generate:hover { background: #0d8de5; }
    .btn-generate:disabled { background: #b3b3b3; cursor: not-allowed; }
    .status {
      font-size: 12px;
      color: #888;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status.error { color: #f24822; }
    .status.success { color: #1bc47d; }
    .dev-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
    .dev-section h2 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      color: #666;
    }
    .dev-section .block {
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 11px;
    }
    .dev-section .selector { color: #666; font-weight: 600; }
    .dev-section .brace { color: #999; }
    .dev-section .refresh {
      margin-bottom: 12px;
      padding: 6px 10px;
      font-size: 11px;
      cursor: pointer;
      background: #eee;
      border: none;
      border-radius: 4px;
      color: #333;
    }
    .dev-section .refresh:hover { background: #e0e0e0; }
    .dev-section .empty { color: #666; font-style: italic; }
  </style>
</head>
<body>
  <h1 class="title">MyBricks</h1>
  <div class="drop-zone placeholder-only" id="zone">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
      <rect x="8" y="2" width="8" height="4" rx="1" ry="1" />
      <path d="M9 14h6M9 18h6" />
    </svg>
    <p class="prompt">Paste JSON here (Cmd+V), then click <strong>Generate</strong></p>
    <textarea id="json" placeholder="JSON"></textarea>
  </div>
  <div class="footer">
    <button class="btn-generate" id="generate">Generate</button>
    <div class="status" id="status"></div>
  </div>
  <div class="dev-section">
    <h2>Class names → CSS</h2>
    <button type="button" class="refresh" id="refresh">Refresh</button>
    <div id="list"></div>
  </div>

  <script>
    const zone = document.getElementById('zone');
    const jsonInput = document.getElementById('json');
    const generateBtn = document.getElementById('generate');
    const statusEl = document.getElementById('status');

    zone.addEventListener('click', (e) => {
      if (e.target !== jsonInput) jsonInput.focus();
    });

    function updatePlaceholder() {
      zone.classList.toggle('placeholder-only', !jsonInput.value.trim());
    }
    jsonInput.addEventListener('input', updatePlaceholder);
    jsonInput.addEventListener('focus', () => zone.classList.remove('placeholder-only'));
    jsonInput.addEventListener('blur', updatePlaceholder);

    function runGenerate(text) {
      const t = (text || '').trim();
      if (!t) return;
      try {
        JSON.parse(t);
      } catch (e) {
        setStatus('Invalid JSON: ' + e.message, 'error');
        return;
      }
      generateBtn.disabled = true;
      setStatus('', '');
      parent.postMessage({ pluginMessage: { type: 'clipboard-data', data: t } }, '*');
    }

    generateBtn.addEventListener('click', () => runGenerate(jsonInput.value));

    document.addEventListener('paste', (e) => {
      const text = (e.clipboardData && e.clipboardData.getData('text/plain')) || '';
      const t = text.trim();
      if (!t) return;
      e.preventDefault();
      jsonInput.value = t;
      updatePlaceholder();
    });

    jsonInput.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        runGenerate(jsonInput.value);
      }
    });

    const listEl = document.getElementById('list');
    const refreshBtn = document.getElementById('refresh');
    function renderClassNames(list) {
      if (!list || list.length === 0) {
        listEl.innerHTML = '<p class="empty">No nodes with className on this page.</p>';
        return;
      }
      listEl.innerHTML = list.map(function(item) {
        const sel = '.' + item.className.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        const css = item.css.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        return '<div class="block"><span class="selector">' + sel + '</span> <span class="brace">{</span>\n' + css + '\n<span class="brace">}</span></div>';
      }).join('');
    }
    function requestClassNames() {
      parent.postMessage({ pluginMessage: { type: 'getClassNames' } }, '*');
    }
    refreshBtn.addEventListener('click', requestClassNames);

    window.onmessage = (event) => {
      const msg = event.data && event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'done') {
        setStatus('', '');
        generateBtn.disabled = false;
        requestClassNames();
      } else if (msg.type === 'error') {
        setStatus(msg.error, 'error');
        generateBtn.disabled = false;
      } else if (msg.type === 'classNames') {
        renderClassNames(msg.list);
      }
    };

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = 'status' + (cls ? ' ' + cls : '');
    }

    updatePlaceholder();
    jsonInput.focus();
    requestClassNames();
  </script>
</body>
</html>
